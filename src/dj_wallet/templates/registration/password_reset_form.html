<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Password Reset</title>
    <style>
      :root {
        --bg: #0b0f14;
        --ink: #f1f5f9;
        --accent: #38bdf8;
        --card: #111823;
        --border: rgba(148, 163, 184, 0.18);
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: "Avenir Next", "Segoe UI", system-ui, sans-serif;
        background: radial-gradient(900px 500px at -10% -10%, rgba(56,189,248,0.25), transparent),
                    radial-gradient(900px 500px at 90% -10%, rgba(249,115,22,0.2), transparent),
                    var(--bg);
        color: var(--ink);
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 20px;
      }
      .card {
        width: 100%;
        max-width: 420px;
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 18px;
        padding: 24px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.3);
      }
      h1 { margin: 0 0 6px; }
      label { display: block; font-weight: 600; margin: 12px 0 6px; }
      input {
        width: 100%;
        padding: 10px 12px;
        border: 1px solid var(--border);
        border-radius: 10px;
        font-size: 14px;
        background: #0f141d;
        color: var(--ink);
      }
      button {
        width: 100%;
        margin-top: 16px;
        background: var(--accent);
        color: white;
        border: none;
        padding: 10px 12px;
        border-radius: 10px;
        font-weight: 600;
      }
      a { color: var(--accent); }
      .muted { color: #6b6b6b; font-size: 13px; }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Password Reset</h1>
      <div class="muted">Enter your email to receive reset instructions.</div>
      <form method="post">
        {% csrf_token %}
        {{ form.email.label_tag }}
        {{ form.email }}
        <button type="submit">Send reset link</button>
      </form>
      <p class="muted" style="margin-top:12px;">
        <a href="/login/">Back to login</a>
      </p>
    </div>
  </body>
</html>
