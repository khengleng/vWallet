<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>vWallet Login</title>
    <style>
      :root {
        --bg: #f6f4f1;
        --ink: #121212;
        --accent: #0b4b6f;
        --card: #ffffff;
        --border: #e6e1db;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: "Avenir Next", "Segoe UI", system-ui, sans-serif;
        background: radial-gradient(900px 500px at 10% -10%, #fff1d1, transparent),
                    radial-gradient(900px 500px at 90% -10%, #d7f1ff, transparent),
                    var(--bg);
        color: var(--ink);
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 20px;
      }
      .card {
        width: 100%;
        max-width: 420px;
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 18px;
        padding: 24px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.06);
      }
      h1 { margin: 0 0 6px; }
      label { display: block; font-weight: 600; margin: 12px 0 6px; }
      input {
        width: 100%;
        padding: 10px 12px;
        border: 1px solid var(--border);
        border-radius: 10px;
        font-size: 14px;
      }
      button {
        width: 100%;
        margin-top: 16px;
        background: var(--accent);
        color: white;
        border: none;
        padding: 10px 12px;
        border-radius: 10px;
        font-weight: 600;
      }
      .error {
        background: #fff3f3;
        border: 1px solid #f5c2c2;
        padding: 8px 10px;
        border-radius: 8px;
        color: #b00020;
        margin-top: 8px;
        font-size: 13px;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>vWallet</h1>
      <div>Sign in to the portal</div>

      {% if form.errors %}
        <div class="error">Invalid username or password.</div>
      {% endif %}

      <form method="post">
        {% csrf_token %}
        <label for="id_username">Username</label>
        {{ form.username }}
        <label for="id_password">Password</label>
        {{ form.password }}
        <button type="submit">Sign In</button>
      </form>
    </div>
  </body>
</html>
