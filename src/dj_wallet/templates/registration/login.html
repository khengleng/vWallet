<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" href="/favicon.ico" />
    <title>2M Platform Login</title>
    <style>
      :root {
        --bg: #0b0f14;
        --ink: #f1f5f9;
        --accent: #38bdf8;
        --card: #111823;
        --border: rgba(148, 163, 184, 0.18);
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: "Avenir Next", "Segoe UI", system-ui, sans-serif;
        background: radial-gradient(900px 500px at -10% -10%, rgba(56,189,248,0.25), transparent),
                    radial-gradient(900px 500px at 90% -10%, rgba(249,115,22,0.2), transparent),
                    var(--bg);
        color: var(--ink);
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 20px;
      }
      .card {
        width: 100%;
        max-width: 420px;
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 18px;
        padding: 24px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.3);
      }
      h1 { margin: 0 0 6px; }
      label { display: block; font-weight: 600; margin: 12px 0 6px; }
      input {
        width: 100%;
        padding: 10px 12px;
        border: 1px solid var(--border);
        border-radius: 10px;
        font-size: 14px;
        background: #0f141d;
        color: var(--ink);
      }
      button {
        width: 100%;
        margin-top: 16px;
        background: var(--accent);
        color: white;
        border: none;
        padding: 10px 12px;
        border-radius: 10px;
        font-weight: 600;
      }
      a { color: var(--accent); }
      .error {
        background: #fff3f3;
        border: 1px solid #f5c2c2;
        padding: 8px 10px;
        border-radius: 8px;
        color: #b00020;
        margin-top: 8px;
        font-size: 13px;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>2M Platform</h1>
      <div>Sign in to the administration portal</div>

      {% if form.errors %}
        <div class="error">Invalid username or password.</div>
      {% endif %}

      <form method="post">
        {% csrf_token %}
        <label for="id_username">Username</label>
        {{ form.username }}
        <label for="id_password">Password</label>
        {{ form.password }}
        <button type="submit">Sign In</button>
      </form>
      <p style="margin-top:12px;font-size:13px;">
        <a href="/password-reset/">Forgot password?</a>
      </p>
    </div>
  </body>
</html>
