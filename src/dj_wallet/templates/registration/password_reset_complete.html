<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Password Updated</title>
    <style>
      body {
        margin: 0;
        font-family: "Avenir Next", "Segoe UI", system-ui, sans-serif;
        background: #0b0f14;
        color: #f1f5f9;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 20px;
      }
      .card {
        width: 100%;
        max-width: 420px;
        background: #111823;
        border: 1px solid rgba(148, 163, 184, 0.18);
        border-radius: 18px;
        padding: 24px;
        text-align: center;
      }
      a { color: #38bdf8; }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Password updated</h1>
      <p>You can now sign in with your new password.</p>
      <p><a href="/login/">Back to login</a></p>
    </div>
  </body>
</html>
