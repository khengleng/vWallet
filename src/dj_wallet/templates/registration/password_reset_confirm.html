<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Reset Password</title>
    <style>
      body {
        margin: 0;
        font-family: "Avenir Next", "Segoe UI", system-ui, sans-serif;
        background: #0b0f14;
        color: #f1f5f9;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 20px;
      }
      .card {
        width: 100%;
        max-width: 420px;
        background: #111823;
        border: 1px solid rgba(148, 163, 184, 0.18);
        border-radius: 18px;
        padding: 24px;
      }
      input {
        width: 100%;
        padding: 10px 12px;
        border: 1px solid rgba(148, 163, 184, 0.18);
        border-radius: 10px;
        font-size: 14px;
        background: #0f141d;
        color: #f1f5f9;
      }
      button {
        width: 100%;
        margin-top: 16px;
        background: #38bdf8;
        color: white;
        border: none;
        padding: 10px 12px;
        border-radius: 10px;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Set new password</h1>
      {% if validlink %}
        <form method="post">
          {% csrf_token %}
          {{ form.as_p }}
          <button type="submit">Update password</button>
        </form>
      {% else %}
        <p>This reset link is invalid or expired.</p>
        <p><a href="/password-reset/">Request a new link</a></p>
      {% endif %}
    </div>
  </body>
</html>
