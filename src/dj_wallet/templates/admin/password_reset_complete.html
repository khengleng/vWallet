{% extends "admin/base_site.html" %}
{% load i18n %}

{% block extrastyle %}
  {{ block.super }}
  <style>
    .password-reset #nav-sidebar {
      display: none;
    }
    .reset-wrap {
      display: grid;
      place-items: center;
      min-height: calc(100vh - 120px);
    }
    .reset-card {
      width: min(460px, 92vw);
      background: #111823;
      border: 1px solid rgba(148, 163, 184, 0.18);
      border-radius: 18px;
      padding: 24px;
      text-align: center;
    }
  </style>
{% endblock %}

{% block content %}
  <div class="reset-wrap">
    <div class="reset-card">
      <h1>{% trans "Password updated" %}</h1>
      <p>{% trans "You can now sign in with your new password." %}</p>
      <p><a href="{% url 'admin:login' %}">{% trans "Back to login" %}</a></p>
    </div>
  </div>
{% endblock %}
