{% extends "admin/base_site.html" %}
{% load i18n %}

{% block extrastyle %}
  {{ block.super }}
  <style>
    .password-reset #nav-sidebar {
      display: none;
    }
    .reset-wrap {
      display: grid;
      place-items: center;
      min-height: calc(100vh - 120px);
    }
    .reset-card {
      width: min(460px, 92vw);
      background: #111823;
      border: 1px solid rgba(148, 163, 184, 0.18);
      border-radius: 18px;
      padding: 24px;
    }
    .reset-card h1 {
      margin-top: 0;
    }
    .reset-card input[type=email] {
      width: 100%;
      padding: 10px 12px;
      margin-top: 6px;
    }
    .reset-card .submit-row input {
      width: 100%;
    }
  </style>
{% endblock %}

{% block content %}
  <div class="reset-wrap">
    <div class="reset-card">
      <h1>{% trans "Reset your password" %}</h1>
      <p>{% trans "Enter your admin email and we’ll send you reset instructions." %}</p>
      <form method="post">{% csrf_token %}
        {{ form.as_p }}
        <div class="submit-row">
          <input type="submit" value="{% trans 'Send reset link' %}">
        </div>
      </form>
    </div>
  </div>
{% endblock %}
